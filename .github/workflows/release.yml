name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14   # cross-compile Intel on the Apple-Silicon runner; the
                           # dedicated macos-13 runner was perpetually queued and
                           # blocked every release since v0.1.4
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: tar -czf wta-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release wta
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wta-${{ matrix.target }}
          path: wta-${{ matrix.target }}.tar.gz

  # A single publish job avoids the matrix racing to *create* the same release
  # (which previously left some binaries un-uploaded).
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
